<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tool Collection</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700&family=Noto+Sans+JP:wght@300;400;500&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
<style>
:root {
  --gold:      #B8922A;
  --gold-lt:   #D4A83A;
  --gold-bg:   #FBF5E6;
  --gold-line: #E8D5A0;
  --body-bg:   #FAFAFA;
  --card-bg:   #FFFFFF;
  --border:    #E0E0E0;
  --text:      #1A1A1A;
  --text-muted:#888888;
}
html { font-size:18px; }
body { font-family:'Noto Sans JP',sans-serif; background-color:var(--body-bg); color:var(--text); margin:0; min-height:100vh; display:flex; flex-direction:column; }

.app-header {
  background:linear-gradient(135deg,#2A1E0A,#1A1206);
  border-bottom:3px solid var(--gold);
  padding:1.5rem 2rem;
  text-align:center;
}
.app-header h1 { font-family:'Cinzel',serif; font-size:1.8rem; letter-spacing:6px; color:var(--gold-lt); margin:0; text-shadow:0 0 24px rgba(200,155,60,.4); }
.app-header p { font-size:.75rem; letter-spacing:3px; color:#A08660; margin:.5rem 0 0; text-transform:uppercase; }

main { flex:1; padding:3rem 1.5rem; max-width:1100px; margin:0 auto; width:100%; box-sizing:border-box; }

.section-label {
  font-family:'Cinzel',serif; font-size:.72rem; letter-spacing:4px; color:var(--gold);
  text-transform:uppercase; padding-bottom:.5rem; border-bottom:2px solid var(--gold-line); margin-bottom:1.5rem;
}

.tools-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(280px, 1fr)); gap:1.25rem; }

.tool-card {
  position:relative;
  display:flex;
  flex-direction:column;
  background:var(--card-bg);
  border:1.5px solid var(--gold-line);
  border-radius:.6rem;
  padding:1.5rem 1.4rem;
  text-decoration:none;
  color:inherit;
  transition:all .2s;
  box-shadow:0 2px 8px rgba(0,0,0,.04);
  overflow:hidden;
}
.tool-card::before {
  content:"";
  position:absolute; inset:0;
  background:linear-gradient(135deg, transparent 60%, rgba(184,146,42,.06));
  pointer-events:none;
}
.tool-card:hover {
  border-color:var(--gold);
  transform:translateY(-3px);
  box-shadow:0 8px 20px rgba(184,146,42,.15);
  color:inherit;
}
.tool-card .tool-icon {
  font-size:2rem;
  color:var(--gold);
  margin-bottom:.75rem;
  line-height:1;
}
.tool-card h2 {
  font-family:'Cinzel',serif;
  font-size:1.05rem;
  letter-spacing:2px;
  color:var(--text);
  margin:0 0 .35rem;
  font-weight:700;
}
.tool-card .version {
  display:inline-block;
  font-family:'Cinzel',serif;
  font-size:.65rem;
  letter-spacing:1px;
  color:var(--gold);
  background:var(--gold-bg);
  border:1px solid var(--gold-line);
  padding:.1rem .5rem;
  border-radius:.25rem;
  margin-bottom:.75rem;
  width:fit-content;
}
.tool-card .description {
  font-size:.82rem;
  color:var(--text-muted);
  line-height:1.55;
  margin:0;
  flex:1;
}
.tool-card .open-link {
  margin-top:1rem;
  display:inline-flex; align-items:center; gap:.35rem;
  font-size:.78rem;
  color:var(--gold);
  font-weight:600;
}
.tool-card:hover .open-link { color:var(--gold-lt); }

.coming-soon {
  border-style:dashed;
  background:#fafafa;
  color:var(--text-muted);
  pointer-events:none;
  opacity:.6;
}
.coming-soon .tool-icon { color:var(--text-muted); }

footer {
  border-top:1px solid var(--border);
  padding:1.5rem;
  text-align:center;
  font-size:.78rem;
  color:var(--text-muted);
}
footer a { color:var(--gold); text-decoration:none; }
footer a:hover { color:var(--gold-lt); text-decoration:underline; }

@media (max-width: 576px) {
  .app-header { padding:1.2rem 1rem; }
  .app-header h1 { font-size:1.3rem; letter-spacing:4px; }
  main { padding:2rem 1rem; }
}
</style>
</head>
<body>

<header class="app-header">
  <h1><i class="bi bi-stars me-2"></i>TOOL COLLECTION</h1>
  <p>Personal Web Tools</p>
</header>

<main>
  <div class="section-label"><i class="bi bi-grid me-1"></i>ツール一覧</div>

  <div class="tools-grid">
    <a class="tool-card" href="./team-divider.html">
      <div class="tool-icon"><i class="bi bi-shield-fill-exclamation"></i></div>
      <h2>LoL Team Divider</h2>
      <span class="version">v1.17</span>
      <p class="description">
        League of Legends カスタム戦用のチーム分けツール。レシオ・レーン・勝率を考慮して2チームを自動生成。
      </p>
      <span class="open-link">開く<i class="bi bi-arrow-right"></i></span>
    </a>
  </div>
</main>

<footer>
  <a href="https://github.com/y-tajima0919/Tool-collection" target="_blank" rel="noopener">
    <i class="bi bi-github me-1"></i>y-tajima0919/Tool-collection
  </a>
</footer>

</body>
</html>
